name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Unit tests ─────────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=cyberguard --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/ tests/

  # ── Security scan (self-hosted) ────────────────────────────────────────────
  security-scan:
    name: CyberGuard Self-Scan
    runs-on: ubuntu-latest
    needs: test
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CyberGuard
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run CyberGuard scan (SARIF output)
        run: |
          cyberguard scan . \
            --format sarif \
            --output cyberguard-results.sarif \
            --no-ai \
            --fail-on none \
            --quiet
        env:
          # Set GROQ_API_KEY as a GitHub Actions secret to enable AI analysis.
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: cyberguard-results.sarif
          category: cyberguard
